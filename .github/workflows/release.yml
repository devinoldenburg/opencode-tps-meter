name: Release

# Publish to npm whenever a `v<version>` tag is pushed.
# The tag name (without the leading `v`) MUST equal `package.json` `version`.
on:
  push:
    tags:
      - "v*"

# `contents: write` → create the GitHub Release.
# `id-token: write` → npm provenance (requires a PUBLIC repository).
permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    # Don't run on forks — only the upstream repo has the NPM_TOKEN.
    if: github.repository == 'devinoldenburg/opencode-tps-meter'
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org" # writes .npmrc using NODE_AUTH_TOKEN

      - name: Install dependencies
        run: npm ci

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Verify version matches the tag
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(node -p "require('./package.json').version")
          echo "tag version : $TAG"
          echo "pkg version : $PKG"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag $TAG does not match package.json version $PKG"
            exit 1
          fi

      - name: Unit tests
        run: npm test

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Verify plugin runtime
        run: npm run verify:plugin

      - name: Demo smoke test (deterministic)
        run: node tools/demo.mjs --ci

      - name: Pack check
        run: npm pack --dry-run

      - name: Publish to npm
        run: |
          if [[ "$GITHUB_REF_NAME" == *-* ]]; then
            npm publish --provenance --access public --tag next
          else
            npm publish --provenance --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Build tarball for release attachment
        run: npm pack

      - name: GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          # Scoped package → tarball is `devinoldenburg-opencode-tps-meter-<ver>.tgz`
          files: devinoldenburg-opencode-tps-meter-*.tgz
